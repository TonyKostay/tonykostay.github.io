<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.0/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link href="templates/css/style.css" rel="stylesheet">
    <title>Lab0</title>
</head>
<body>
    <section class="main">
        <div class="row">
            <div class="col-md-4">
                <div class="main__leftSide">
                    <h2>Добавить отзыв</h2>
                    <hr>
                    <form name='reviewSend'method="post">
                        <div class="mb-3">
                            <label for="exampleInputName" class="form-label">Имя</label>
                            <input type="text" name='userName' class="form-control" id="exampleInputName" aria-describedby="emailHelp" required>
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputReview" class="form-label">Отзыв</label>
                            <textarea class="form-control" name='userReview' id="exampleInputReview" rows="5" required></textarea>
                        </div>
                        <button id="sendForm" type="button" class="btn btn-primary">Отправить</button>
                        <br>
                        <br>
                        <span class="errors"></span>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="main__rightSide">
                    <h2>Отзывы</h2>
                    <hr>
                    <div class="main__rightSide-content">

                    </div>
                    <nav class="main__rightSide-pagination">
                        <ul class="pagination pagination-lg">
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </section>
<script src="templates/js/reviews-script.js"></script>
</body>
</html>
